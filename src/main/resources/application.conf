mongodb {
  database = "sdkman"
  database = ${?MONGODB_DATABASE}
  host = "127.0.0.1"
  host = ${?MONGODB_HOST}
  port = "27017"
  port = ${?MONGODB_PORT}
  username = null
  username = ${?MONGODB_USERNAME}
  password = null
  password = ${?MONGODB_PASSWORD}
  authmechanism = null
  authmechanism = ${?MONGODB_AUTHMECHANISM}
}

postgres {
  database = "sdkman"
  database = ${?POSTGRES_DATABASE}
  host = "127.0.0.1"
  host = ${?POSTGRES_HOST}
  port = "5432"
  port = ${?POSTGRES_PORT}
  username = "postgres"
  username = ${?POSTGRES_USERNAME}
  password = "postgres"
  password = ${?POSTGRES_PASSWORD}
  sslmode = "disable"
  sslmode = ${?POSTGRES_SSLMODE}
}

persistence {
  backend = "mongo"
  backend = ${?PERSISTENCE_BACKEND}
}

server {
  port = 8080
  port = ${?PORT}
  host = "0.0.0.0"
  host = ${?HOST}
}
