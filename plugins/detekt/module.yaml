product: jvm/amper-plugin

description: A plugin to run the Detekt linter.

pluginInfo:
  settingsClass: org.jetbrains.amper.plugins.detekt.Settings

# No hard dependency on Detekt itself — resolved dynamically via Classpath in plugin.yaml

settings:
  jvm:
    jdk:
      version: 21
  kotlin:
    languageVersion: 2.1
