tasks:
  check:
    action: !io.sdkman.kotlintoolchain.plugins.ktlint.runKtlintCheck
      commonParameters:
        settings: ${pluginSettings}
        sources: ${module.kotlinJavaSources}
        ktlintClasspath:
          - $libs.ktlint.cli
        rulesetClasspath: ${pluginSettings.rulesetClasspath}
      outputReport: ${taskOutputDir}/ktlint-report.xml

  format:
    action: !io.sdkman.kotlintoolchain.plugins.ktlint.runKtlintFormat
      commonParameters: ${check.action.commonParameters}
      outputReport: ${taskOutputDir}/ktlint-format-report.xml

checks:
  - performedBy: check
    name: ktlint

commands:
  - name: ktlintFormat
    performedBy: format
