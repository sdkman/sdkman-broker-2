version: 2
updates:
  # Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      ktor:
        patterns:
          - "io.ktor*"
      arrow:
        patterns:
          - "io.arrow-kt*"
      testing:
        patterns:
          - "io.kotest*"
          - "io.mockk*"
      exposed:
        patterns:
          - "org.jetbrains.exposed*"
      detekt:
        patterns:
          - "io.gitlab.arturbosch.detekt*"
          - "com.github.marc0der*"
      ktlint:
        patterns:
          - "com.pinterest.ktlint*"
      jib:
        patterns:
          - "com.google.cloud.tools*"
      release-plugin:
        patterns:
          - "org.eclipse.jgit*"
          - "org.bouncycastle*"
          - "org.slf4j*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
